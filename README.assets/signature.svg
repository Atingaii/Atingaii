<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" role="img" aria-label="Spark signature">
  <style>
    .sig {
      font-family: "Brush Script MT","Lucida Handwriting","Segoe Script","Comic Sans MS",cursive;
      font-size: 86px;
      font-style: italic;
      fill: #06B6D4;
    }
    .tag {
      font-family: "Fira Code","JetBrains Mono","Menlo",monospace;
      font-size: 14px;
      letter-spacing: 4px;
      fill: #94a3b8;
    }
    @media (prefers-color-scheme: dark) {
      .tag { fill: #cbd5e1; }
    }
  </style>
  <text class="sig" x="20" y="86">Spark</text>
  <text class="sig" x="172" y="86" fill="#0ea5e9">.</text>
  <line x1="20" y1="100" x2="320" y2="100" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
  <text class="tag" x="22" y="122">// keep curious, keep building</text>
</svg>
