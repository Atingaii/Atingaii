<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="whoami terminal card">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="400" height="280" rx="12" fill="#0b1021"/>
  <rect width="400" height="34" fill="#0f172a"/>
  <rect width="400" height="22" y="12" fill="#0f172a"/>

  <circle cx="20" cy="17" r="5" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="17" r="5" fill="#27c93f"/>
  <text x="200" y="22" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Fira Code',monospace"
        font-size="12" fill="#94a3b8">~ whoami</text>

  <line x1="0" y1="34" x2="400" y2="34" stroke="url(#line)" stroke-width="1.5" opacity="0.55"/>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Fira Code',monospace" font-size="13">
    <g fill="#06B6D4">
      <text x="22" y="68">name</text>
      <text x="22" y="92">school</text>
      <text x="22" y="116">focus</text>
      <text x="22" y="140">stack</text>
      <text x="22" y="164">editor</text>
      <text x="22" y="188">shell</text>
      <text x="22" y="212">status</text>
    </g>
    <g fill="#475569">
      <text x="100" y="68">:</text>
      <text x="100" y="92">:</text>
      <text x="100" y="116">:</text>
      <text x="100" y="140">:</text>
      <text x="100" y="164">:</text>
      <text x="100" y="188">:</text>
      <text x="100" y="212">:</text>
    </g>
    <g fill="#e2e8f0">
      <text x="112" y="68">Spark</text>
      <text x="112" y="92">SWU · Undergrad</text>
      <text x="112" y="116">Backend / AI-tooling</text>
      <text x="112" y="140">Java · Go · Astro</text>
      <text x="112" y="164">IntelliJ IDEA · Vim</text>
      <text x="112" y="188">WSL2 + tmux</text>
      <text x="112" y="212">在折腾，且持续折腾中</text>
    </g>

    <text x="22" y="252" fill="#94a3b8">$</text>
    <text x="38" y="252" fill="#06B6D4">
      ▋
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.4;0.6;1" dur="1.1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
